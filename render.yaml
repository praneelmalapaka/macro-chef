services:
  - type: web
    name: macrochef-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build && npm run migrate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SCHEMA
        value: public
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: "*"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_SKIP_SEND
        value: "false"
      - key: DEV_LOGIN_ENABLED
        value: "false"
  - type: web
    name: macrochef-web
    runtime: static
    buildCommand: ./scripts/build-flutter-web.sh
    staticPublishPath: ./mobile/build/web
    envVars:
      - key: API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
